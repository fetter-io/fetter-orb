name: CI Orb Model

on:
  pull_request_target:
    paths:
      - '.github/**'
      - 'orb-model/**'
  push:
    paths:
      - '.github/**'
      - 'orb-model/**'

defaults:
  run:
    working-directory: orb-model

jobs:
  #-----------------------------------------------------------------------------
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        rust: ["1.82.0", stable]

    name: Model Test / ${{ matrix.os }} / Rust ${{ matrix.rust }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Git commit info
        run: git log -n 1

      - name: Install Rust
        run: rustup install --no-self-update ${{ matrix.rust }} && rustup default ${{ matrix.rust }}

      - name: Run tests
        run: cargo test --verbose -- --test-threads=1

  #-----------------------------------------------------------------------------
  quality:
    name: Model Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup install --no-self-update stable && rustup default stable

      - name: Check formatting
        run: |
          rustup component add rustfmt
          cargo fmt -- --check

      - name: Lint with Clippy
        run: |
          rustup component add clippy
          cargo clippy -- -D warnings
