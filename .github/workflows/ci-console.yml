name: CI Orb Console

on:
  pull_request_target:
    paths:
      - 'orb-console/**'
  push:
    paths:
      - 'orb-console/**'

defaults:
  run:
    working-directory: orb-console

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: orb-console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

      - name: Build frontend
        run: npm run build
